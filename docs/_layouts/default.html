<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="Roberto Lupi">
  
  <title>{{ page.title | default: site.title }} - Deep Cuts</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/icon.png' | relative_url }}">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <!-- Premium Header / Glassmorphic Navigation -->
  <header class="site-header">
    <div class="header-container">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <img src="{{ '/icon.png' | relative_url }}" alt="Deep Cuts" style="width:28px;height:28px;vertical-align:middle;margin-right:8px;border-radius:4px;">
        <span class="logo-accent">DEEP</span>CUTS
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Overview</a>
        <a href="{{ '/tech/' | relative_url }}" class="nav-link {% if page.url contains 'tech' %}active{% endif %}">Technology</a>
        <a href="{{ '/changelog/' | relative_url }}" class="nav-link {% if page.url contains 'changelog' %}active{% endif %}">Changelog</a>
        <a href="https://github.com/robertolupi/deep-cuts" target="_blank" rel="noopener noreferrer" class="nav-btn-github">
          <svg class="github-icon" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
            <path fill="currentColor" d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 2.23.48 2.69-.56 2.69-.56.36-.92.88-1.17.88-1.17.72-.48-.05-.47-.05-.47.8.06 1.22.82 1.22.82.71 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
          </svg>
          GitHub
        </a>
      </nav>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="site-content">
    {{ content }}
  </main>

  <!-- Site Footer -->
  <footer class="site-footer">
    <div class="footer-container">
      <p>&copy; {{ site.time | date: "%Y" }} Roberto Lupi. Released under the <a href="https://github.com/robertolupi/deep-cuts/blob/main/LICENSE.md" target="_blank" rel="noopener noreferrer">AGPL-3.0 License</a>.</p>
      <p class="footer-sub">Designed for offline-first audio production intelligence.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
</body>
</html>
